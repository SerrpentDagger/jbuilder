plugins {
	id 'java-library'
	id 'maven-publish'
}

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(25)
	}
}

task sourcesJar(type: Jar) {
	archiveClassifier = 'sources'
	from sourceSets.main.allJava
}

artifacts {
	archives sourcesJar
}

publishing {
	publications {
		mavenJava(MavenPublication) {
			from components.java
			artifact sourcesJar
			pom {
				name = 'jbuilder'
				description = 'Convenience wrapper around JFrame'
				url = 'https://github.com/serrpentdagger/jbuilder'
			}
		}
	}
}
